# OpenOCD config for GD32F4xx via J-Link SWD interface
# Usage: openocd -f scripts/openocd/gd32f4x_jlink.cfg

source [find interface/jlink.cfg]
transport select swd
adapter speed 4000

# GD32F4xx is SWD-compatible with STM32F4xx targets
source [find target/stm32f4x.cfg]

# Override target name for clarity
set _CHIPNAME gd32f450
